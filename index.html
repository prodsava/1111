<!doctype html>
<html lang="bs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Red Black Predictor</title>
<style>
:root{
  --bg:#06070b;
  --panel:#10141e;
  --panel2:#151a26;
  --line:#293143;
  --muted:#8f98ad;
  --text:#f7f8ff;
  --gold:#f5bd43;
  --red:#ef263d;
  --green:#25d366;
}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 50% -12%,rgba(245,189,67,.24),transparent 34%),
    radial-gradient(circle at 15% 5%,rgba(239,38,61,.13),transparent 28%),
    linear-gradient(180deg,#07080d,#05060a 70%);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:14px;
}
.app{
  width:100%;
  max-width:430px;
  min-height:calc(100vh - 28px);
  background:rgba(11,14,21,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:30px;
  box-shadow:0 24px 70px rgba(0,0,0,.72);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.header{
  padding:22px 18px 14px;
  text-align:center;
  background:linear-gradient(180deg,rgba(255,255,255,.055),transparent);
  border-bottom:1px solid rgba(255,255,255,.06);
}
h1{margin:0;font-size:26px;font-weight:950;letter-spacing:.2px}
h1 span{color:var(--gold)}
.sub{color:var(--muted);font-size:13px;margin-top:7px;line-height:1.35}
.main{padding:16px;display:flex;flex-direction:column;gap:14px;flex:1}
.panel{
  background:linear-gradient(145deg,rgba(255,255,255,.045),rgba(255,255,255,.01)),var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  padding:15px;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
}
.topline{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.title{font-size:15px;font-weight:950}
.hint{color:var(--muted);font-size:12px;font-weight:800}
.mode{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
button{
  border:0;
  border-radius:18px;
  padding:15px;
  color:white;
  font-size:16px;
  font-weight:950;
  cursor:pointer;
  transition:transform .12s ease,opacity .12s ease,box-shadow .12s ease,background .12s ease;
  user-select:none;
}
button:active{transform:scale(.972);opacity:.86}
.mode button{
  background:#171d2a;
  border:1px solid #313a50;
  color:#aeb6c9;
}
.mode button.active{
  background:linear-gradient(135deg,#ffd55a,#eaa21a);
  color:#111;
  border-color:#f5bd43;
  box-shadow:0 10px 22px rgba(245,189,67,.16);
}
.preview{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:9px;
}
.slot{
  height:58px;
  border-radius:18px;
  background:#0a0d14;
  border:1px dashed #343d53;
  color:#4f596f;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:950;
  font-size:18px;
  position:relative;
  overflow:hidden;
}
.slot:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 45%);
  pointer-events:none;
}
.slot.r{
  background:linear-gradient(135deg,#b90b1e,#ff3048);
  border-color:#ff6373;
  color:white;
}
.slot.b{
  background:linear-gradient(135deg,#000,#343a47);
  border-color:#626b7e;
  color:white;
}
.inputs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:11px;
  margin-top:12px;
}
.redbtn{background:linear-gradient(135deg,#bc0b1f,#ff3048);box-shadow:0 10px 22px rgba(239,38,61,.15)}
.blackbtn{background:linear-gradient(135deg,#000,#3a4150);border:1px solid #555f72}
.actions{
  display:grid;
  grid-template-columns:1fr;
  gap:11px;
}
.backupActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:11px;
}
.sessionActions{
  display:grid;
  grid-template-columns:1fr;
  gap:11px;
}
.newsession{
  background:linear-gradient(135deg,#24314d,#3b4f7a);
  border:1px solid #53699a;
  color:#e7ecff;
}
.backup{
  background:#182b20;
  border:1px solid #2f6b45;
  color:#bfffd2;
}
.import{
  background:#1d2234;
  border:1px solid #3b4868;
  color:#d9e2ff;
}
input[type=file]{display:none}
.undo{
  background:#202635;
  border:1px solid #394257;
  color:#d8dded;
}
.clear{
  background:#31151b;
  border:1px solid #56303a;
  color:#ffb7c0;
}
.generate{
  width:100%;
  padding:18px;
  border-radius:22px;
  background:linear-gradient(135deg,#ffd85d,#eaa01a);
  color:#111;
  font-size:21px;
  box-shadow:0 14px 30px rgba(245,189,67,.18);
}
.result{
  margin-top:auto;
  background:
    radial-gradient(circle at top,rgba(245,189,67,.18),transparent 55%),
    linear-gradient(145deg,rgba(255,255,255,.055),rgba(255,255,255,.01)),
    #0f131d;
  border:1px solid #31384c;
  border-radius:28px;
  padding:18px;
  text-align:center;
  min-height:244px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  transform:translateY(0);
}
.result.hidden{
  display:none;
}
.resultLabel{
  color:var(--muted);
  font-size:11px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  font-weight:950;
  margin-bottom:11px;
}
.card{
  width:118px;
  height:156px;
  border-radius:20px;
  margin:0 auto 13px;
  background:#f4f5f8;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:68px;
  font-weight:950;
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 20px 38px rgba(0,0,0,.48);
  animation:pop .22s ease-out;
}
.card.red{color:var(--red)}
.card.black{color:#050505}
@keyframes pop{from{transform:translateY(10px) scale(.94);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.signal{font-size:39px;font-weight:950;margin-bottom:7px;animation:fadeUp .22s ease-out}
.signal.red{color:#ff354b}
.signal.black{color:#f4f4f4}
.conf{
  display:inline-block;
  margin:0 auto;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(245,189,67,.13);
  border:1px solid rgba(245,189,67,.32);
  color:#ffe2a2;
  font-size:14px;
  font-weight:950;
}
.reason{
  color:#9aa3b8;
  font-size:13px;
  line-height:1.35;
  margin-top:11px;
  min-height:18px;
}
.feedback{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:11px;
  margin-top:13px;
}
.win{background:linear-gradient(135deg,#12883b,#27d767);box-shadow:0 10px 22px rgba(37,211,102,.12)}
.lose{background:linear-gradient(135deg,#8a1118,#ff3f4f);box-shadow:0 10px 22px rgba(255,63,79,.12)}
@keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.footer{
  text-align:center;
  color:#737d92;
  font-size:11.5px;
  line-height:1.35;
  padding:0 8px 2px;
}
.pulse{
  animation:pulse .18s ease-out;
}
@keyframes pulse{from{transform:scale(.98)}to{transform:scale(1)}}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <h1>Red / Black <span>Predictor</span></h1>
    <div class="sub">Prvo unesi zadnje karte, pa generiši signal. NEW SESSION čuva stari niz.</div>
  </header>

  <div class="main">
    <section class="panel">
      <div class="topline">
        <div class="title">1. Unesi karte</div>
        <div id="countText" class="hint">0/5</div>
      </div>
      <div id="preview" class="preview"></div>
      <div class="inputs">
        <button class="redbtn" onclick="addCard('R')">RED</button>
        <button class="blackbtn" onclick="addCard('B')">BLACK</button>
      </div>
    </section>

    <div class="actions">
      <button class="undo" onclick="undo()">UNDO LAST CARD</button>
    </div>

    <div class="sessionActions">
      <button class="newsession" onclick="newSession()">NEW SESSION</button>
    </div>

    <div class="backupActions">
      <button class="backup" onclick="downloadBackup()">BACKUP</button>
      <button class="import" onclick="openImport()">IMPORT</button>
      <input id="importFile" type="file" accept="application/json,.json" onchange="importBackup(event)">
    </div>

    <button class="generate" onclick="generate()">GENERATE</button>

    <section id="result" class="result hidden">
      <div class="resultLabel">Predikcija</div>
      <div id="card" class="card red">♥</div>
      <div id="signal" class="signal red">RED</div>
      <div id="conf" class="conf">70%</div>
      <div id="reason" class="reason">Signal spreman.</div>

      <div class="feedback">
        <button class="win" onclick="mark(true)">WIN</button>
        <button class="lose" onclick="mark(false)">LOSE</button>
      </div>
    </section>

    <div class="footer">NEW SESSION arhivira trenutni niz. BACKUP čuva aktivnu i stare sesije.</div>
  </div>
</main>

<script>
const KEY="rb_predictor_last5_precision_v7";
const OLD_KEY="rb_predictor_smooth_v6_backup";
let db=loadDB();

function normalizeDB(data){
  return {
    cards:Array.isArray(data.cards) ? data.cards : [],
    mode:5,
    pending:null,
    patternDB:data.patternDB || {},
    sessions:Array.isArray(data.sessions) ? data.sessions : [],
    recentSignals:Array.isArray(data.recentSignals) ? data.recentSignals : []
  };
}

function loadDB(){
  let current=localStorage.getItem(KEY);
  if(current) return normalizeDB(JSON.parse(current));

  let old=localStorage.getItem(OLD_KEY);
  if(old){
    try{
      let parsed=JSON.parse(old);
      if(parsed && Array.isArray(parsed.cards)){
        let migrated=normalizeDB(parsed);
        localStorage.setItem(KEY,JSON.stringify(migrated));
        return migrated;
      }
    }catch(e){}
  }

  return {cards:[],mode:5,pending:null,patternDB:{},sessions:[],recentSignals:[]};
}
const $=id=>document.getElementById(id);

function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function opp(c){return c==="RED"?"BLACK":"RED"}
function short(c){return c==="RED"?"R":"B"}
function key(a){return a.join("")}

function downloadBackup(){
  const backup={
    app:"red-black-predictor",
    version:6,
    exportedAt:new Date().toISOString(),
    data:db
  };

  const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const date=new Date().toISOString().slice(0,10);

  const a=document.createElement("a");
  a.href=url;
  a.download="red-black-predictor-backup-"+date+".json";
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

function openImport(){
  $("importFile").click();
}

function newSession(){
  if(db.cards.length===0){
    db.pending=null;
    save();
    hideResult();
    render();
    alert("Nema karata za arhiviranje. Nova sesija je već prazna.");
    return;
  }

  const archived={
    id:"session-"+Date.now(),
    createdAt:new Date().toISOString(),
    cards:[...db.cards],
    mode:5,
    patternDB:JSON.parse(JSON.stringify(db.patternDB || {})),
    recentSignals:Array.isArray(db.recentSignals) ? [...db.recentSignals] : [],
    count:db.cards.length
  };

  db.sessions=db.sessions || [];
  db.sessions.push(archived);
  if(db.sessions.length>100) db.sessions.shift();

  db.cards=[];
  db.mode=5;
  db.pending=null;
  db.recentSignals=[];
  save();
  hideResult();
  render();
  alert("Sesija je sačuvana u istoriju. Krenula je nova prazna sesija.");
}

function importBackup(event){
  const file=event.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(){
    try{
      const imported=JSON.parse(reader.result);
      const data=imported.data || imported;

      if(!data || !Array.isArray(data.cards)){
        alert("Backup fajl nije validan.");
        return;
      }

      if(!confirm("Učitati ovaj backup i zamijeniti trenutnu bazu?")) return;

      db=normalizeDB(data);

      save();
      hideResult();
      render();
      alert("Backup je uspješno učitan.");
    }catch(e){
      alert("Ne mogu pročitati backup fajl.");
    }finally{
      event.target.value="";
    }
  };

  reader.readAsText(file);
}

function setMode(n){
  db.mode=5;
  db.pending=null;
  save();
  hideResult();
  render();
}

function addCard(c){
  db.cards.push(c);
  if(db.cards.length>500) db.cards.shift();
  db.pending=null;
  save();
  hideResult();
  render(true);
}

function undo(){
  db.cards.pop();
  db.pending=null;
  save();
  hideResult();
  render();
}

function resetAll(){
  alert("Reset je uklonjen radi sigurnosti. Koristi UNDO za zadnju kartu ili IMPORT za vraćanje backup-a.");
}

function streak(a){
  if(!a.length) return {side:null,n:0};
  let last=a[a.length-1], n=1;
  for(let i=a.length-2;i>=0;i--){
    if(a[i]===last) n++;
    else break;
  }
  return {side:last,n};
}

function mergeStatsForPattern(pattern,pick){
  let merged={win:0,total:0};

  // Active session is strongest
  let current=db.patternDB?.[pattern]?.[pick];
  if(current){
    merged.win+=(current.win || 0) * 1.35;
    merged.total+=(current.total || 0) * 1.35;
  }

  // Recent archived sessions still matter, old sessions fade
  const sessions=(db.sessions || []).slice(-12);
  sessions.forEach((s,idx)=>{
    let old=s.patternDB?.[pattern]?.[pick];
    if(old){
      let age=sessions.length-1-idx;
      let weight=Math.max(0.35,1-(age*0.07));
      merged.win+=(old.win || 0) * weight;
      merged.total+=(old.total || 0) * weight;
    }
  });

  return merged;
}

function learnBoost(pattern,pick){
  let r=mergeStatsForPattern(pattern,pick);
  if(!r || r.total<3) return 0; // minimum sample filter
  let wr=r.win/r.total;
  let sample=Math.min(1,r.total/9);
  let boost=0;

  if(wr>=.76) boost=22;
  else if(wr>=.68) boost=16;
  else if(wr>=.60) boost=10;
  else if(wr>=.55) boost=5;
  else if(wr<=.28) boost=-22;
  else if(wr<=.38) boost=-16;
  else if(wr<=.45) boost=-8;

  return Math.round(boost*sample);
}

function streakContinuationRate(side){
  // Looks at active + archived cards and checks how often 3 streak continued to 4.
  let wins=0,total=0;
  const sequences=[db.cards].concat((db.sessions||[]).slice(-12).map(s=>s.cards||[]));
  sequences.forEach(arr=>{
    for(let i=3;i<arr.length;i++){
      if(arr[i-1]===side && arr[i-2]===side && arr[i-3]===side){
        total++;
        if(arr[i]===side) wins++;
      }
    }
  });
  if(total<4) return null;
  return wins/total;
}

function recentLossBias(){
  // If last 2 signals lost on same style, reduce stubborn repeats.
  const recent=(db.recentSignals||[]).slice(-4);
  const losses=recent.filter(x=>x.result==="LOSS");
  if(losses.length<2) return null;
  return losses[losses.length-1].pick;
}

function predict(){
  let n=5;
  db.mode=5;

  if(db.cards.length<n){
    return {wait:true, message:"Treba još " + (n-db.cards.length) + " karti"};
  }

  let recent=db.cards.slice(-5);
  let pattern=key(recent);
  let r=recent.filter(x=>x==="R").length;
  let b=recent.filter(x=>x==="B").length;
  let s=streak(recent);
  let red=50, black=50;
  let why=[];

  // 1) Full 5-card pattern learning has priority when enough samples exist.
  let redLearn=learnBoost(pattern,"RED");
  let blackLearn=learnBoost(pattern,"BLACK");
  red+=redLearn;
  black+=blackLearn;
  if(Math.abs(redLearn-blackLearn)>=6) why.push("5-card learning");

  // 2) Streak continuation filter: not blindly opposite.
  if(s.n>=3){
    let streakSide=s.side==="R" ? "RED" : "BLACK";
    let opposite=streakSide==="RED" ? "BLACK" : "RED";
    let sideShort=s.side;
    let contRate=streakContinuationRate(sideShort);

    let continueBoost=0;
    let breakBoost=0;

    if(contRate!==null){
      if(contRate>=0.58){
        continueBoost+=16;
        why.push("streak continues");
      }else if(contRate<=0.42){
        breakBoost+=16;
        why.push("streak breaks");
      }else{
        continueBoost+=6;
        breakBoost+=6;
        why.push("mixed streak");
      }
    }else{
      // Without data: 3 streak gets continuation chance; 5+ leans break.
      if(s.n===3) continueBoost+=12;
      else if(s.n===4){ continueBoost+=5; breakBoost+=9; }
      else breakBoost+=15;
      why.push(streakSide+" streak");
    }

    // If exact 5-card learning disagrees, learning already added above and can override.
    if(streakSide==="RED"){
      red+=continueBoost;
      black+=breakBoost;
    }else{
      black+=continueBoost;
      red+=breakBoost;
    }
  }

  // 3) Shape/pattern rules for 5-card structure.
  const p5=recent.join("");
  const last4=recent.slice(-4).join("");
  const rules5={
    RRRBR:["RED",12], BBBRB:["BLACK",12],
    RBRRR:["RED",10], BRBBB:["BLACK",10],
    RBBBB:["BLACK",10], BRRRR:["RED",10],
    RRBRR:["RED",9], BBRBB:["BLACK",9],
    RBBBR:["BLACK",8], BRRRB:["RED",8],
    RBRBR:["BLACK",12], BRBRB:["RED",12],
    RRBBR:["RED",9], BBRRB:["BLACK",9]
  };
  if(rules5[p5]){
    let ru=rules5[p5];
    if(ru[0]==="RED") red+=ru[1]; else black+=ru[1];
    why.push("5-pattern");
  }

  const rules4={
    RRBB:["RED",7], BBRR:["BLACK",7],
    RBRR:["BLACK",6], BRBB:["RED",6],
    RRBR:["RED",6], BBRB:["BLACK",6],
    RBRB:["RED",8], BRBR:["BLACK",8]
  };
  if(rules4[last4]){
    let ru=rules4[last4];
    if(ru[0]==="RED") red+=ru[1]; else black+=ru[1];
    why.push("tail pattern");
  }

  // 4) Session mood: choppy vs streaky hidden filter.
  let last20=db.cards.slice(-20);
  if(last20.length>=12){
    let alternations=0,repeats=0;
    for(let i=1;i<last20.length;i++){
      if(last20[i]!==last20[i-1]) alternations++;
      else repeats++;
    }
    let altRate=alternations/(last20.length-1);
    if(altRate>=0.64){
      let next=db.cards[db.cards.length-1]==="R" ? "BLACK" : "RED";
      if(next==="RED") red+=8; else black+=8;
      why.push("choppy mode");
    }else if(altRate<=0.42){
      let next=db.cards[db.cards.length-1]==="R" ? "RED" : "BLACK";
      if(next==="RED") red+=8; else black+=8;
      why.push("streaky mode");
    }
  }

  // 5) Dominance is now mild; it should not overpower pattern learning.
  if(r-b>=3){ black+=6; why.push("red heavy"); }
  else if(b-r>=3){ red+=6; why.push("black heavy"); }
  else if(r-b===1){ red+=2; }
  else if(b-r===1){ black+=2; }

  // 6) Adaptive correction after repeated losses: if same side recently lost, slightly reduce it.
  let bad=recentLossBias();
  if(bad==="RED"){ red-=6; why.push("loss adjust"); }
  if(bad==="BLACK"){ black-=6; why.push("loss adjust"); }

  // 7) If still tight, use momentum, not automatic opposite.
  if(Math.abs(red-black)<6){
    if(db.cards[db.cards.length-1]==="R"){ red+=4; why.push("momentum"); }
    else { black+=4; why.push("momentum"); }
  }

  let pick=red>=black ? "RED" : "BLACK";
  let diff=Math.abs(red-black);
  let conf=Math.max(52,Math.min(86,50+Math.round(diff*.72)));

  return {
    wait:false,
    pick,
    pattern,
    conf: conf + "%",
    reason: why.length ? "Signal: " + why.slice(0,2).join(" + ") : "Predikcija spremna."
  };
}
function generate(){
  let p=predict();
  if(p.wait){
    $("result").classList.remove("hidden");
    $("card").textContent="?";
    $("card").className="card red";
    $("signal").textContent="DODAJ";
    $("signal").className="signal red";
    $("conf").textContent=p.message;
    $("reason").textContent="Unesi dovoljno karata za izabrani pregled.";
    db.pending=null;
    save();
    render();
    return;
  }

  db.pending={pick:p.pick,pattern:p.pattern};
  save();

  $("result").classList.remove("hidden");
  $("result").classList.remove("pulse");
  void $("result").offsetWidth;
  $("result").classList.add("pulse");

  $("card").textContent=p.pick==="RED" ? "♥" : "♠";
  $("card").className="card " + (p.pick==="RED" ? "red" : "black");
  $("signal").textContent=p.pick;
  $("signal").className="signal " + (p.pick==="RED" ? "red" : "black");
  $("conf").textContent=p.conf;
  $("reason").textContent=p.reason;

  setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"}),60);
  render();
}

function mark(win){
  if(!db.pending) return;

  let predicted=db.pending.pick;
  let actual=win ? predicted : opp(predicted);
  db.cards.push(short(actual));
  if(db.cards.length>500) db.cards.shift();

  let pat=db.pending.pattern;
  if(!db.patternDB[pat]){
    db.patternDB[pat]={RED:{win:0,total:0},BLACK:{win:0,total:0}};
  }
  db.patternDB[pat][predicted].total++;
  if(win) db.patternDB[pat][predicted].win++;

  db.recentSignals=db.recentSignals || [];
  db.recentSignals.push({
    pattern:pat,
    pick:predicted,
    result:win ? "WIN" : "LOSS",
    actual:actual,
    time:Date.now()
  });
  if(db.recentSignals.length>60) db.recentSignals.shift();

  db.pending=null;
  save();
  hideResult();
  render(true);
}

function hideResult(){
  $("result").classList.add("hidden");
}

function render(pop){
  db.mode=5;
  $("modeText") && ($("modeText").textContent="LAST 5");

  let recent=db.cards.slice(-5);
  $("countText").textContent=Math.min(recent.length,5)+"/5";

  let preview=$("preview");
  preview.innerHTML="";
  for(let i=0;i<5;i++){
    let slot=document.createElement("div");
    let val=recent[i];
    slot.className="slot";
    if(val==="R"){slot.className+=" r";slot.textContent="R";}
    else if(val==="B"){slot.className+=" b";slot.textContent="B";}
    else slot.textContent="–";
    preview.appendChild(slot);
  }

  if(pop){
    preview.classList.remove("pulse");
    void preview.offsetWidth;
    preview.classList.add("pulse");
  }
}

render();
</script>
